<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Da Silva Grocery List</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Nunito:wght@400;500;600;700&display=swap');

    :root {
      --bg: #fdf6ee;
      --surface: #ffffff;
      --surface2: #fdf0e0;
      --primary: #c0622a;
      --primary-light: #e8845a;
      --primary-faint: #fdeee5;
      --accent: #4a7c59;
      --accent-light: #d4ead9;
      --text: #2c1a0e;
      --text-muted: #8a6a50;
      --border: #e8d5c0;
      --shadow: 0 2px 12px rgba(150,80,30,0.10);
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── SPLASH MODAL ───────────────────────── */
    #splash {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    #splashCard {
      background: #fff; border-radius: 22px;
      padding: 36px 28px; width: 100%; max-width: 360px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.22); text-align: center;
    }
    #splashCard .splash-icon { font-size: 3rem; }
    #splashCard h1 {
      font-family: 'Playfair Display', serif;
      color: #7a9640; font-size: 1.6rem; line-height: 1.25;
    }
    #splashCard p { color: #6b7280; font-size: 0.95rem; }
    #splashCard input {
      width: 100%;
      padding: 13px 18px; border-radius: 50px;
      border: 2px solid #d1d5db;
      font-family: 'Nunito', sans-serif; font-size: 1rem;
      color: #2c1a0e; background: #f9fafb;
    }
    #splashCard input:focus { outline: none; border-color: #a8be6e; }
    #splashCard button {
      width: 100%; padding: 13px; border-radius: 50px; border: none;
      background: #a8be6e; color: #fff;
      font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: background .2s;
    }
    #splashCard button:hover { background: #7a9640; }

    /* ── HEADER ─────────────────────────────── */
    header {
      background: var(--primary);
      color: #fff; padding: 18px 20px 14px;
      position: sticky; top: 0; z-index: 50;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.2rem, 4vw, 1.7rem); line-height: 1.2;
    }
    header .sub {
      font-size: .82rem; color: rgba(255,255,255,0.78); margin-top: 2px;
    }
    header .user-bar {
      margin-top: 10px; display: flex; align-items: center; gap: 8px;
      font-size: .88rem;
    }
    header .user-bar strong { color: #ffe5c8; }
    header .user-bar button {
      background: rgba(255,255,255,0.18); border: none; border-radius: 20px;
      color: #fff; padding: 3px 12px; font-size: .8rem; cursor: pointer;
      font-family: 'Nunito', sans-serif;
    }
    header .user-bar button:hover { background: rgba(255,255,255,0.3); }

    /* ── TABS ────────────────────────────────── */
    .tabs {
      display: flex; background: var(--surface);
      border-bottom: 2px solid var(--border);
      position: sticky; top: 95px; z-index: 40;
    }
    .tabs button {
      flex: 1; padding: 13px; border: none; background: none;
      font-family: 'Nunito', sans-serif; font-size: .95rem; font-weight: 600;
      color: var(--text-muted); cursor: pointer; border-bottom: 3px solid transparent;
      margin-bottom: -2px; transition: color .2s, border-color .2s;
    }
    .tabs button.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* ── MAIN ────────────────────────────────── */
    main { max-width: 640px; margin: 0 auto; padding: 20px 16px 80px; }

    /* ── ADD FORM ────────────────────────────── */
    .add-form {
      background: var(--surface); border-radius: var(--radius);
      padding: 18px; box-shadow: var(--shadow); margin-bottom: 22px;
    }
    .add-form h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; margin-bottom: 14px; color: var(--primary);
    }
    .form-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .add-form input[type="text"], .add-form select {
      flex: 1; min-width: 120px;
      padding: 11px 14px; border-radius: 50px; border: 1.5px solid var(--border);
      font-family: 'Nunito', sans-serif; font-size: .95rem; color: var(--text);
      background: var(--bg); outline: none;
      transition: border-color .2s;
    }
    .add-form input[type="text"]:focus, .add-form select:focus {
      border-color: var(--primary);
    }
    .add-form input[type="number"] {
      width: 80px; padding: 11px 10px; border-radius: 50px;
      border: 1.5px solid var(--border); font-family: 'Nunito', sans-serif;
      font-size: .95rem; color: var(--text); background: var(--bg); outline: none;
      transition: border-color .2s;
    }
    .add-form input[type="number"]:focus { border-color: var(--primary); }
    .add-form button {
      padding: 11px 22px; border-radius: 50px; border: none;
      background: var(--primary); color: #fff;
      font-family: 'Nunito', sans-serif; font-size: .95rem; font-weight: 700;
      cursor: pointer; white-space: nowrap; transition: background .2s;
    }
    .add-form button:hover { background: var(--primary-light); }

    /* ── CATEGORY ────────────────────────────── */
    .category-group { margin-bottom: 18px; }
    .category-label {
      display: flex; align-items: center; gap: 8px;
      font-weight: 700; font-size: .88rem; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .07em;
      margin-bottom: 8px; padding: 0 4px;
    }
    .category-label span { font-size: 1.1rem; }

    /* ── ITEM CARD ────────────────────────────── */
    .item-card {
      background: var(--surface); border-radius: var(--radius);
      padding: 13px 15px; margin-bottom: 8px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: var(--shadow); border: 1.5px solid transparent;
      transition: opacity .25s, transform .25s, border-color .2s;
      animation: slideIn .22s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .item-card.ticked {
      opacity: .55; background: var(--surface2);
      border-color: var(--accent-light);
    }
    .item-card input[type="checkbox"] {
      width: 22px; height: 22px; accent-color: var(--accent);
      cursor: pointer; flex-shrink: 0; border-radius: 6px;
    }
    .item-info { flex: 1; min-width: 0; }
    .item-name {
      font-weight: 600; font-size: 1rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .item-card.ticked .item-name { text-decoration: line-through; color: var(--text-muted); }
    .item-meta { font-size: .8rem; color: var(--text-muted); margin-top: 2px; }
    .item-qty {
      background: var(--primary-faint); color: var(--primary);
      border-radius: 20px; padding: 2px 10px; font-size: .8rem; font-weight: 700;
      flex-shrink: 0;
    }
    .item-delete {
      background: none; border: none; cursor: pointer; color: var(--text-muted);
      font-size: 1.1rem; padding: 4px; border-radius: 6px; flex-shrink: 0;
      transition: color .15s, background .15s;
    }
    .item-delete:hover { color: var(--primary); background: var(--primary-faint); }

    /* ── CLEAR TICKED ────────────────────────── */
    .action-bar {
      display: flex; justify-content: flex-end; margin-bottom: 12px;
    }
    .action-bar button {
      background: none; border: 1.5px solid var(--border); border-radius: 50px;
      padding: 7px 18px; color: var(--text-muted); font-family: 'Nunito', sans-serif;
      font-size: .85rem; cursor: pointer; transition: border-color .2s, color .2s;
    }
    .action-bar button:hover { border-color: var(--primary); color: var(--primary); }

    /* ── EMPTY STATE ─────────────────────────── */
    .empty {
      text-align: center; padding: 40px 20px; color: var(--text-muted);
    }
    .empty .icon { font-size: 2.8rem; margin-bottom: 12px; }
    .empty p { font-size: .95rem; }

    /* ── HISTORY ─────────────────────────────── */
    .history-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px;
    }
    .history-header h2 {
      font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--primary);
    }
    .history-filter select {
      padding: 7px 14px; border-radius: 50px; border: 1.5px solid var(--border);
      font-family: 'Nunito', sans-serif; font-size: .85rem; color: var(--text);
      background: var(--bg); outline: none; cursor: pointer;
    }
    .history-clear {
      background: none; border: 1.5px solid var(--border); border-radius: 50px;
      padding: 7px 16px; color: var(--text-muted); font-family: 'Nunito', sans-serif;
      font-size: .82rem; cursor: pointer; transition: border-color .2s, color .2s;
    }
    .history-clear:hover { border-color: var(--primary); color: var(--primary); }

    .history-item {
      background: var(--surface); border-radius: var(--radius);
      padding: 12px 15px; margin-bottom: 8px;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: var(--shadow); font-size: .92rem;
    }
    .history-item .h-name { font-weight: 600; }
    .history-item .h-meta { font-size: .78rem; color: var(--text-muted); margin-top: 2px; }
    .history-badge {
      background: var(--accent-light); color: var(--accent);
      border-radius: 20px; padding: 3px 12px; font-size: .78rem; font-weight: 700;
      white-space: nowrap;
    }

    /* ── FAV BUTTON (on ticked items) ───────────── */
    .item-fav {
      background: none; border: none; cursor: pointer;
      font-size: 1.2rem; padding: 4px; border-radius: 6px; flex-shrink: 0;
      transition: transform .15s;
      line-height: 1;
    }
    .item-fav:hover { transform: scale(1.25); }

    /* ── FAVOURITES PANE ─────────────────────────── */
    .favs-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px;
    }
    .favs-header h2 {
      font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--primary);
    }
    .favs-clear {
      background: none; border: 1.5px solid var(--border); border-radius: 50px;
      padding: 7px 16px; color: var(--text-muted); font-family: 'Nunito', sans-serif;
      font-size: .82rem; cursor: pointer; transition: border-color .2s, color .2s;
    }
    .favs-clear:hover { border-color: var(--primary); color: var(--primary); }

    .fav-card {
      background: var(--surface); border-radius: var(--radius);
      padding: 13px 15px; margin-bottom: 8px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: var(--shadow); border: 1.5px solid #ffe5a0;
      animation: slideIn .22s ease;
    }
    .fav-card .fav-star { font-size: 1.3rem; flex-shrink: 0; }
    .fav-card .fav-info { flex: 1; min-width: 0; }
    .fav-card .fav-name { font-weight: 600; font-size: 1rem; }
    .fav-card .fav-meta { font-size: .8rem; color: var(--text-muted); margin-top: 2px; }
    .fav-add-btn {
      padding: 7px 16px; border-radius: 50px; border: none;
      background: var(--primary); color: #fff;
      font-family: 'Nunito', sans-serif; font-size: .82rem; font-weight: 700;
      cursor: pointer; white-space: nowrap; transition: background .2s; flex-shrink: 0;
    }
    .fav-add-btn:hover { background: var(--primary-light); }
    .fav-remove {
      background: none; border: none; cursor: pointer; color: var(--text-muted);
      font-size: 1.1rem; padding: 4px; border-radius: 6px; flex-shrink: 0;
      transition: color .15s, background .15s;
    }
    .fav-remove:hover { color: var(--primary); background: var(--primary-faint); }
  </style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div id="splashCard">
    <div class="splash-icon">🛒</div>
    <h1>Da Silva<br>Grocery List</h1>
    <p>Who's shopping today?</p>
    <input id="nameInput" type="text" placeholder="Enter your name..." maxlength="30" autocomplete="off" />
    <button id="startBtn">Let's go!</button>
  </div>
</div>

<!-- HEADER -->
<header>
  <h1>🛒 Da Silva Grocery List</h1>
  <div class="sub" style="display:flex;justify-content:space-between;align-items:center;">
    <span>Shared list — everyone sees updates instantly</span>
    <button onclick="downloadApp()" style="background:rgba(255,255,255,0.18);border:1.5px solid rgba(255,255,255,0.5);border-radius:20px;color:#fff;padding:4px 14px;font-size:.78rem;cursor:pointer;font-family:'Nunito',sans-serif;white-space:nowrap;">⬇ Download</button>
  </div>
  <div class="user-bar">
    Shopping as: <strong id="displayName">—</strong>
    <button id="changeNameBtn">Change</button>
  </div>
</header>

<!-- TABS -->
<div class="tabs">
  <button class="active" id="tabShop" onclick="showTab('shop')">🛒 Shopping List</button>
  <button id="tabFavs" onclick="showTab('favs')">⭐ Favourites</button>
  <button id="tabHistory" onclick="showTab('history')">📋 History</button>
</div>

<!-- MAIN -->
<main>

  <!-- SHOPPING TAB -->
  <div id="shopPane">

    <div class="add-form">
      <h2>+ Add to List</h2>
      <div class="form-row">
        <input type="text" id="itemName" placeholder="Item name..." maxlength="60" />
        <input type="number" id="itemQty" min="1" value="1" style="width:70px;" />
      </div>
      <div class="form-row">
        <select id="itemCat">
          <option value="Produce">🥦 Produce</option>
          <option value="Meat & Fish">🥩 Meat & Fish</option>
          <option value="Dairy">🧀 Dairy</option>
          <option value="Bakery">🍞 Bakery</option>
          <option value="Pantry">🥫 Pantry</option>
          <option value="Personal Care">🧴 Personal Care</option>
          <option value="Household">🧹 Household</option>
          <option value="Frozen">❄️ Frozen</option>
          <option value="Other">🛒 Other</option>
        </select>
        <button onclick="addItem()">Add</button>
      </div>
    </div>

    <div class="action-bar">
      <button onclick="clearTicked()">Remove ticked</button>
    </div>

    <div id="listContainer"></div>

  </div>

  <!-- FAVOURITES TAB -->
  <div id="favsPane" style="display:none;">
    <div class="favs-header">
      <h2>⭐ Favourites</h2>
      <button class="favs-clear" onclick="clearFavourites()">Clear all</button>
    </div>
    <div id="favsContainer"></div>
  </div>

  <!-- HISTORY TAB -->
  <div id="historyPane" style="display:none;">
    <div class="history-header">
      <h2>📋 Purchase History</h2>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="history-filter">
          <select id="historyFilter" onchange="renderHistory()">
            <option value="all">Everyone</option>
          </select>
        </div>
        <button class="history-clear" onclick="clearHistory()">Clear all</button>
      </div>
    </div>
    <div id="historyContainer"></div>
  </div>

</main>

<script>
  // ── STORAGE KEY (unique per household) ───────────────────────────────────
  const STORE_KEY = 'nel_familie_inkopie_v1';
  const HIST_KEY  = 'nel_familie_geskiedenis_v1';
  const NAME_KEY  = 'nel_familie_naam_v1';
  const FAVS_KEY  = 'da_silva_favourites_v1';

  const CATS = [
    { id: 'Produce',        emoji: '🥦' },
    { id: 'Meat & Fish',    emoji: '🥩' },
    { id: 'Dairy',          emoji: '🧀' },
    { id: 'Bakery',         emoji: '🍞' },
    { id: 'Pantry',         emoji: '🥫' },
    { id: 'Personal Care',  emoji: '🧴' },
    { id: 'Household',      emoji: '🧹' },
    { id: 'Frozen',         emoji: '❄️' },
    { id: 'Other',          emoji: '🛒' },
  ];

  let currentUser = localStorage.getItem(NAME_KEY) || '';
  let items      = JSON.parse(localStorage.getItem(STORE_KEY) || '[]');
  let history    = JSON.parse(localStorage.getItem(HIST_KEY)  || '[]');
  let favourites = JSON.parse(localStorage.getItem(FAVS_KEY)  || '[]');

  function save()     { localStorage.setItem(STORE_KEY, JSON.stringify(items)); }
  function saveHist() { localStorage.setItem(HIST_KEY,  JSON.stringify(history)); }
  function saveFavs() { localStorage.setItem(FAVS_KEY,  JSON.stringify(favourites)); }

  // ── SPLASH ────────────────────────────────────────────────────────────────
  function startApp(name) {
    if (!name.trim()) return;
    currentUser = name.trim();
    localStorage.setItem(NAME_KEY, currentUser);
    document.getElementById('displayName').textContent = currentUser;
    document.getElementById('splash').style.display = 'none';
  }

  document.getElementById('startBtn').onclick = () =>
    startApp(document.getElementById('nameInput').value);
  document.getElementById('nameInput').onkeydown = e =>
    e.key === 'Enter' && startApp(e.target.value);

  if (currentUser) {
    document.getElementById('displayName').textContent = currentUser;
    document.getElementById('splash').style.display = 'none';
  }

  document.getElementById('changeNameBtn').onclick = () => {
    document.getElementById('nameInput').value = currentUser;
    document.getElementById('splash').style.display = 'flex';
  };

  // ── TABS ──────────────────────────────────────────────────────────────────
  function showTab(tab) {
    document.getElementById('shopPane').style.display    = tab === 'shop'    ? '' : 'none';
    document.getElementById('favsPane').style.display    = tab === 'favs'    ? '' : 'none';
    document.getElementById('historyPane').style.display = tab === 'history' ? '' : 'none';
    document.getElementById('tabShop').classList.toggle('active',    tab === 'shop');
    document.getElementById('tabFavs').classList.toggle('active',    tab === 'favs');
    document.getElementById('tabHistory').classList.toggle('active', tab === 'history');
    if (tab === 'history') renderHistory();
    if (tab === 'favs')    renderFavourites();
  }

  // ── ADD ITEM ──────────────────────────────────────────────────────────────
  function addItem() {
    const name = document.getElementById('itemName').value.trim();
    const qty  = parseInt(document.getElementById('itemQty').value) || 1;
    const cat  = document.getElementById('itemCat').value;
    if (!name) { document.getElementById('itemName').focus(); return; }
    items.push({
      id: Date.now(),
      name, qty, cat,
      ticked: false,
      addedBy: currentUser,
      addedAt: new Date().toLocaleString('en-ZA')
    });
    save();
    document.getElementById('itemName').value = '';
    document.getElementById('itemQty').value = 1;
    renderList();
  }

  document.getElementById('itemName').onkeydown = e =>
    e.key === 'Enter' && addItem();

  // ── TICK / DELETE ─────────────────────────────────────────────────────────
  function toggleTick(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    item.ticked = !item.ticked;
    if (item.ticked) {
      history.unshift({ ...item, boughtBy: currentUser, boughtAt: new Date().toLocaleString('en-ZA') });
      saveHist();
    }
    save();
    renderList();
  }

  function deleteItem(id) {
    items = items.filter(i => i.id !== id);
    save();
    renderList();
  }

  function clearTicked() {
    items = items.filter(i => !i.ticked);
    save();
    renderList();
  }

  // ── RENDER LIST ───────────────────────────────────────────────────────────
  function renderList() {
    const container = document.getElementById('listContainer');
    container.innerHTML = '';

    const active  = items.filter(i => !i.ticked);
    const ticked  = items.filter(i =>  i.ticked);
    const ordered = [...active, ...ticked];

    if (ordered.length === 0) {
      container.innerHTML = `<div class="empty"><div class="icon">🛒</div><p>List is empty — add some items!</p></div>`;
      return;
    }

    const groups = {};
    ordered.forEach(item => {
      if (!groups[item.cat]) groups[item.cat] = [];
      groups[item.cat].push(item);
    });

    CATS.forEach(cat => {
      if (!groups[cat.id]) return;
      const grp = document.createElement('div');
      grp.className = 'category-group';
      grp.innerHTML = `<div class="category-label"><span>${cat.emoji}</span>${cat.id}</div>`;
      groups[cat.id].forEach(item => {
        const card = document.createElement('div');
        card.className = 'item-card' + (item.ticked ? ' ticked' : '');
        const alreadyFav = favourites.some(f => f.name === item.name && f.cat === item.cat);
        const favBtn = item.ticked
          ? `<button class="item-fav" onclick="addToFavourites(${item.id})" title="${alreadyFav ? 'Already in Favourites' : 'Save to Favourites'}">${alreadyFav ? '⭐' : '☆'}</button>`
          : '';
        card.innerHTML = `
          <input type="checkbox" ${item.ticked ? 'checked' : ''} onchange="toggleTick(${item.id})" />
          <div class="item-info">
            <div class="item-name">${escHtml(item.name)}</div>
            <div class="item-meta">Added by ${escHtml(item.addedBy)} · ${item.addedAt}</div>
          </div>
          <div class="item-qty">x${item.qty}</div>
          ${favBtn}
          <button class="item-delete" onclick="deleteItem(${item.id})" title="Remove">✕</button>`;
        grp.appendChild(card);
      });
      container.appendChild(grp);
    });
  }

  // ── RENDER HISTORY ────────────────────────────────────────────────────────
  function renderHistory() {
    const filter = document.getElementById('historyFilter').value;
    const container = document.getElementById('historyContainer');
    container.innerHTML = '';

    // Populate filter dropdown
    const people = [...new Set(history.map(h => h.boughtBy))];
    const sel = document.getElementById('historyFilter');
    const prev = sel.value;
    sel.innerHTML = '<option value="all">Everyone</option>';
    people.forEach(p => {
      const o = document.createElement('option');
      o.value = p; o.textContent = p;
      if (p === prev) o.selected = true;
      sel.appendChild(o);
    });

    const filtered = filter === 'all' ? history : history.filter(h => h.boughtBy === filter);

    if (filtered.length === 0) {
      container.innerHTML = `<div class="empty"><div class="icon">📋</div><p>No purchase history yet.</p></div>`;
      return;
    }

    filtered.forEach(h => {
      const div = document.createElement('div');
      div.className = 'history-item';
      div.innerHTML = `
        <div>
          <div class="h-name">${escHtml(h.name)} <span style="color:var(--text-muted);font-weight:400;">x${h.qty}</span></div>
          <div class="h-meta">${escHtml(h.cat)} · Bought by ${escHtml(h.boughtBy)} · ${h.boughtAt}</div>
        </div>
        <div class="history-badge">✓ Bought</div>`;
      container.appendChild(div);
    });
  }

  function clearHistory() {
    if (!confirm('Are you sure you want to clear the history?')) return;
    history = [];
    saveHist();
    renderHistory();
  }

  // ── FAVOURITES ────────────────────────────────────────────────────────────
  function addToFavourites(itemId) {
    const item = items.find(i => i.id === itemId);
    if (!item) return;
    const already = favourites.some(f => f.name === item.name && f.cat === item.cat);
    if (already) return;
    favourites.push({ favId: Date.now(), name: item.name, qty: item.qty, cat: item.cat });
    saveFavs();
    renderList(); // refresh star state
  }

  function removeFromFavourites(favId) {
    favourites = favourites.filter(f => f.favId !== favId);
    saveFavs();
    renderFavourites();
    renderList(); // refresh star state
  }

  function addFavToList(favId) {
    const fav = favourites.find(f => f.favId === favId);
    if (!fav) return;
    items.push({
      id: Date.now(),
      name: fav.name, qty: fav.qty, cat: fav.cat,
      ticked: false,
      addedBy: currentUser,
      addedAt: new Date().toLocaleString('en-ZA')
    });
    save();
    showTab('shop');
  }

  function clearFavourites() {
    if (!confirm('Are you sure you want to clear all favourites?')) return;
    favourites = [];
    saveFavs();
    renderFavourites();
    renderList();
  }

  function renderFavourites() {
    const container = document.getElementById('favsContainer');
    container.innerHTML = '';
    if (favourites.length === 0) {
      container.innerHTML = `<div class="empty"><div class="icon">⭐</div><p>No favourites yet — tick off a purchased item and tap ☆ to save it here.</p></div>`;
      return;
    }
    const groups = {};
    favourites.forEach(f => {
      if (!groups[f.cat]) groups[f.cat] = [];
      groups[f.cat].push(f);
    });
    CATS.forEach(cat => {
      if (!groups[cat.id]) return;
      const grp = document.createElement('div');
      grp.className = 'category-group';
      grp.innerHTML = `<div class="category-label"><span>${cat.emoji}</span>${cat.id}</div>`;
      groups[cat.id].forEach(fav => {
        const card = document.createElement('div');
        card.className = 'fav-card';
        card.innerHTML = `
          <span class="fav-star">⭐</span>
          <div class="fav-info">
            <div class="fav-name">${escHtml(fav.name)}</div>
            <div class="fav-meta">${escHtml(fav.cat)} · qty: ${fav.qty}</div>
          </div>
          <button class="fav-add-btn" onclick="addFavToList(${fav.favId})">+ Add to List</button>
          <button class="fav-remove" onclick="removeFromFavourites(${fav.favId})" title="Remove from Favourites">✕</button>`;
        grp.appendChild(card);
      });
      container.appendChild(grp);
    });
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── DOWNLOAD ─────────────────────────────────────────────────────────────
  function downloadApp() {
    const html = document.documentElement.outerHTML;
    const blob = new Blob([html], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'da-silva-grocery-list.html';
    a.click();
    URL.revokeObjectURL(a.href);
  }

  // ── INIT ──────────────────────────────────────────────────────────────────
  renderList();
</script>
</body>
</html>
